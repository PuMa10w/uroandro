<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dynamic teal gradient -->
    <linearGradient id="uroMedGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a0fff0"/>
      <stop offset="25%" stop-color="#7bf4e2"/>
      <stop offset="50%" stop-color="#3dd6bd"/>
      <stop offset="75%" stop-color="#2cd0b7"/>
      <stop offset="100%" stop-color="#0fa895"/>
    </linearGradient>
    
    <!-- Dark theme background -->
    <linearGradient id="darkBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#030712"/>
    </linearGradient>
    
    <!-- Light theme background -->
    <linearGradient id="lightBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4efe6"/>
      <stop offset="100%" stop-color="#e8e0d0"/>
    </linearGradient>
    
    <!-- Glow filter for premium look -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background - works for both themes -->
  <rect width="512" height="512" rx="80" fill="url(#darkBg)" class="uro-med-logo-bg"/>
  
  <!-- Medical symbol - stylized kidney/prostate fusion -->
  <g transform="translate(256 200)" filter="url(#glow)">
    <!-- Outer shape - kidney silhouette -->
    <path d="M90 20 C90 0, -90 0, -90 60 C-90 120, 0 140, 0 200 C0 140, 90 120, 90 60 C90 0, 90 0, 90 20 Z" 
          fill="url(#uroMedGradient)" opacity="0.95"/>
    
    <!-- Inner detail - medical cross -->
    <rect x="-12" y="70" width="24" height="60" fill="rgba(13, 27, 47, 0.95)" rx="4"/>
    <rect x="-26" y="94" width="52" height="12" fill="rgba(13, 27, 47, 0.95)" rx="4"/>
  </g>
  
  <!-- App name -->
  <text x="256" y="340" 
        font-family="Manrope, -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif" 
        font-size="88" 
        font-weight="700" 
        fill="#f4f9ff" 
        text-anchor="middle"
        letter-spacing="-0.03em"
        class="uro-med-logo-text">UroMed</text>
  
  <!-- Premium accent dot -->
  <circle cx="256" cy="390" r="6" fill="#3dd6bd" opacity="0.8"/>
  
  <!-- Subtle shine effect -->
  <ellipse cx="200" cy="150" rx="80" ry="60" fill="white" opacity="0.05" transform="rotate(-20)"/>
</svg>