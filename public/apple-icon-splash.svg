<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Premium teal gradient -->
    <linearGradient id="splashGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a0fff0"/>
      <stop offset="50%" stop-color="#3dd6bd"/>
      <stop offset="100%" stop-color="#0fa895"/>
    </linearGradient>
    
    <!-- Dynamic dark background -->
    <radialGradient id="splashBg" cx="0.5" cy="0.4" r="0.8">
      <stop offset="0%" stop-color="#0a1629"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="120" height="120" fill="url(#splashBg)"/>
  
  <!-- Premium medical icon -->
  <g transform="translate(60 40)">
    <!-- Kidney/prostate fusion shape -->
    <path d="M50 0 C50 -20, -50 -20, -50 30 C-50 80, 0 100, 0 100 C0 100, 50 80, 50 30 C50 -20, 50 0, 50 0 Z" 
          fill="url(#splashGrad)" opacity="0.9"/>
    <!-- Medical cross detail -->
    <rect x="-8" y="30" width="16" height="40" fill="#0d1b2f" rx="3"/>
    <rect x="-20" y="50" width="40" height="8" fill="#0d1b2f" rx="3"/>
  </g>
  
  <!-- App name - centered bottom -->
  <text x="60" y="105" 
        font-family="Manrope, -apple-system, sans-serif" 
        font-size="32" 
        font-weight="700" 
        fill="#f4f9ff" 
        text-anchor="middle"
        letter-spacing="-0.04em">UroMed</text>
  
  <!-- Premium accent -->
  <circle cx="60" cy="112" r="3" fill="#3dd6bd" opacity="0.6"/>
</svg>